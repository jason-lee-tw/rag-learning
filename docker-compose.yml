services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - ./.env
    environment:
      PORT: "${PORT}"
      PHOENIX_COLLECTOR_ENDPOINT: "http://phoenix:4317"
      RELOAD: "true"
    depends_on:
      pgvector:
        condition: service_healthy
      phoenix:
        condition: service_started
      ollama-checker:
        condition: service_completed_successfully
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - __pycache__/

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./.env

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    volumes:
      - phoenix_data:/phoenix
    environment:
      - PHOENIX_WORKING_DIR=/phoenix
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:6006"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-checker:
    image: curlimages/curl:latest
    env_file:
      - ./.env
    network_mode: host
    volumes:
      - ./docker/ollama-checker.sh:/scripts/ollama-checker.sh:ro
    entrypoint: ["sh", "/scripts/ollama-checker.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgvector_data:
  phoenix_data:
